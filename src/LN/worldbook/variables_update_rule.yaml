rules:
  meta:
    engine: MVU
    root_path: stat_data
    patch_priority:
      - time_and_scene
      - status_and_cost
      - economy_and_assets
      - identity_and_faction

  world.current_time:
    format: YYYY-MM-DD HH:mm
    check:
      - 必须与本轮剧情推进时间一致

  world.current_period:
    enum: [深夜, 夜晚, 清晨, 白天, 黄昏]
    check:
      - 必须与 current_time 对应

  world.current_location:
    type: string
    check:
      - 必须与正文场景一致
      - 禁止写入外世界地点名

  world.current_district:
    type: string
    check:
      - 艾瑞拉场景应优先写官方分区名（北门分区 / 中环分区 / 南港分区）
      - 非艾瑞拉场景可留空，不要沿用过期分区

  world.current_site_type / world.current_site_id / world.current_site_label:
    type: object
    check:
      - current_site_type 仅使用 x_station / hx_dorm / tax_office / 空字符串
      - 进入 X号性控所、H系男奴公寓、分区税务局时，应同步维护完整 site 信息
      - 若当前不在编号设施内，current_site_id / current_site_label 可清空

  world.current_faction:
    type: string
    check:
      - 势力变化时同步 player.faction

  world.exchange_rules:
    type: fixed_object
    check:
      - same_level_theoretical_rate 固定为 1.0
      - cross_level_loss_rate 固定为 0.80
      - 艾瑞拉/淬灵区: male=0.55, female=1.00
      - 汐屿区: male=0.55, female=0.55
      - 诺丝区: male=0.45, female=0.45
      - 圣教区: exchange_enabled=false

  player.identity.citizen_id / player.citizen_id:
    type: string
    check:
      - 两个字段保持一致

  player.identity.neural_protocol / player.neural_protocol:
    type: enum
    allowed: [none, beta]
    check:
      - 两个字段保持一致

  player.core_status.*:
    type: object
    check:
      - hp/mp/sanity/reputation 的 current 必须钳制在 [0,max]
      - player.status.* 与 player.core_status.* 保持同步

  player.psionic.rank / player.psionic_rank:
    type: rank
    allowed: [Lv.1, Lv.2, Lv.3, Lv.4, Lv.5]
    check:
      - 两个字段保持一致

  player.psionic.density_level:
    type: integer
    check:
      - 默认与 rank 对应的等级一致

  player.psionic.energy_value:
    type: object
    check:
      - current/max 与 player.core_status.mp.current/max 保持一致

  player.psionic.conversion_rate.current:
    type: number
    range:
      male: 0.15~0.30
      female: 0.80~1.20
    check:
      - 以小数写入，不要写百分号字符串

  player.psionic.recovery_rate.current:
    type: number
    range:
      male: 0.70~2.00
      female: 0.10~0.40
    check:
      - 以小数写入，不要写百分号字符串

  player.assets.lcoin:
    type: object
    check:
      - 维护 lv1~lv5 与 total
      - 同级货币优先写入当前 rank 对应层级

  player.residence:
    type: object
    check:
      - current_residence_id / current_residence_label 必须同步维护
      - unlocked_residence_ids 应保留已获得住处，不要无故丢失
      - 艾瑞拉若未明确搬迁，可默认沿用 assigned_hx_dorm_label 作为官方住册住处

  player.chip:
    type: object
    check:
      - beta_equipped 为 true 且 tax_officer_id 为空时，应触发税务官分配
      - assigned_district / assigned_x_station_* / assigned_hx_dorm_* / tax_officer_* / tax_arrears 需同步维护
      - 艾瑞拉 Beta 管理链默认使用分区 + 编号设施，不要只写“X号性控所 / HX男奴公寓”而不给编号

  player.status_tags / player.core_affixes:
    type: list
    check:
      - 只记录当前仍生效的状态
      - core_affixes 至少包含 name/desc/type/source

  player.lingshu_parts[*].status:
    type: list
    check:
      - 只记录该灵枢当前状态，不重复写全量世界规则

  monthly_settlement:
    type: process
    check:
      - 跨月时必须结算固定收支、关系漂移、区域事件
      - 月结后的结果必须写回 stat_data，而非只写在正文中
      - 若余额不足，未结清部分必须累积到 player.chip.tax_arrears
