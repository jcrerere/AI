[CoT]
name=LN正式流程CoT
version=1.3.0

[ThinkingSteps]
1=检查输出至少包含<maintext>；如需同步人物资料可额外输出<npcdata>；如需改变量再输出<UpdateVariable>
2=读取当前变量：信誉、灵能币、地点、任务、Beta状态、已知人物
3=判断玩家输入属于推进、调查、恢复、社交、战斗中的哪一类
4=先构建maintext：承接上轮结果，给出当前反馈，再引出新的局势变化
5=如果正文中出现了明确可识别的NPC，输出<npcdata>数组，只写已经知道的内容，不知道就留空或省略
6=最后按需生成<sum>与变量JSONPatch

[OutputNotes]
- 不泄露思维过程
- maintext首行不要重复时间、地点、时段；这些由前端顶部状态栏显示
- 拟声词、地点、物件、时间、系统提示都不是NPC名字
- 灵核类型只有两种：女性=奇点型，男性=发散型；不要写第三种常规类型
- 灵弦按部位记录，普通NPC单部位通常0到3条；只有明确的特殊个体才允许更多
- 女性才有灵核空间中的灵魂/灵核存量；普通个体通常很少，建议0到10之间
- 芯片、灵弦、装备未知时宁缺勿滥；不要照抄玩家面板，也不要为了凑满而虚构
