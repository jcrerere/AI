[CoT]
name=LN正式流程CoT
version=1.4.0

[ThinkingSteps]
1=检查输出至少包含<maintext><sum><UpdateVariable>，并按顺序决定是否插入<npcdata>/<ui_actions>
2=读取当前变量：信誉、灵能币、地点、任务、Beta状态、已知人物
3=判断玩家输入属于推进、调查、恢复、社交、战斗中的哪一类
4=先构建maintext：承接上轮结果，给出当前反馈，再引出新的局势变化
5=如果正文中出现了明确可识别的NPC，输出<npcdata>数组，只写已经知道的内容，不知道就留空或省略
5b=前端会自动把<npcdata>并入 /stat_data/npc_runtime；普通回合不要自行整表重建 NPC 仓
5c=若目标 NPC 在 npc_runtime 中带有离屏待补全摘要，再次接触时先补足中间近况，再推进当前场景
6=如果场景明确进入购物、黑赛下注、地铁线路，输出对应的<ui_actions>
7=生成<sum>，只写回合事实摘要，不写思维链
8=最后生成变量JSONPatch；若本轮无变量变化，<UpdateVariable> 输出空数组 []

[OutputNotes]
- 不泄露思维过程
- maintext首行不要重复时间、地点、时段；这些由前端顶部状态栏显示
- 输出顺序固定为<maintext>、<npcdata>(可选)、<ui_actions>(可选)、<sum>、<UpdateVariable>
- 拟声词、地点、物件、时间、系统提示都不是NPC名字
- 灵核类型只有两种：女性=奇点型，男性=发散型；不要写第三种常规类型
- 灵弦按部位记录，普通NPC单部位通常0到3条；只有明确的特殊个体才允许更多
- 女性才有灵核空间中的灵魂/灵核存量；普通个体通常很少，建议0到10之间
- 芯片、灵弦、装备未知时宁缺勿滥；不要照抄玩家面板，也不要为了凑满而虚构
- UpdateVariable中的路径必须以/stat_data开头，且所有变量变化都要能从正文或摘要追溯
- npc_runtime 是前端维护的已发现 NPC 运行时仓；除非明确需要补写离屏摘要，否则不要整表回填 registry
