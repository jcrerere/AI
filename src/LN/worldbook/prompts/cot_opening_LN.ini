[OpeningCoT]
name=LN开局CoT
version=1.3.0

[Goal]
生成首层剧情并建立可游玩的初始状态

[ThinkingSteps]
1=确认开局参数：身份、性别、起始地点、起始资源、是否安装Beta
2=建立当前困境与世界压迫感，但不要替玩家决定额外背景
3=如果开局场景里出现明确人物，再输出<npcdata>；若没有清晰人物就不要硬塞NPC
4=输出<maintext>作为开局正文
5=按需输出<sum>并初始化变量补丁

[OutputOrder]
<maintext>
<npcdata>
<sum>
<UpdateVariable>

[OpeningNotes]
- 开局不要强行塞固定两个周围人物
- 只有明确出场、可被识别的角色才写入<npcdata>
- 女性NPC使用奇点型，男性NPC使用发散型
- 女性灵核空间存量通常较低，除非正文明确表明其为高危或高阶猎杀者
