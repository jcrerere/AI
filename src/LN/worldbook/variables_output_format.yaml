output_format:
  rule:
    - 回复顺序固定为 <maintext>、<npcdata>(可选)、<sum>、<UpdateVariable>(可选)
    - <sum> 只写 1~3 句回合事实摘要，不写思维过程
    - <UpdateVariable> 必须包裹合法 JSONPatch 数组
    - 所有路径必须以 /stat_data 开头
    - 允许 op: replace, delta, insert, remove, move
    - 变量变化必须能从本轮正文或摘要中追溯

  format: |-
    <sum>
    时间: 2077-11-03 21:10；地点: 艾瑞拉·中环外街。
    结果: 玩家完成交涉，信誉-2，获得税务官夜巡名单。
    悬念: 下一步可潜入税务分区或去黑市换证。
    </sum>
    <UpdateVariable>
    <Analysis>(IN ENGLISH, <= 80 words)
    - time elapsed:
    - dramatic update allowed: yes/no
    - variable impacts:
    </Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/stat_data/world/current_time", "value": "2077-11-03 21:10" },
      { "op": "replace", "path": "/stat_data/world/current_period", "value": "夜晚" },
      { "op": "replace", "path": "/stat_data/world/current_location", "value": "艾瑞拉·中环外街" },
      { "op": "delta", "path": "/stat_data/player/core_status/reputation/current", "value": -2 },
      { "op": "delta", "path": "/stat_data/player/assets/lcoin/lv1", "value": 120 },
      { "op": "insert", "path": "/stat_data/player/core_affixes/-", "value": { "name": "状态：目标锁定", "desc": "夜莺已开始追查玩家行踪。", "type": "debuff", "source": "交涉后续" } }
    ]
    </JSONPatch>
    </UpdateVariable>

npc_data_format:
  rule:
    - <npcdata> 为可选块，内容必须是合法 JSON 数组
    - 只记录本轮正文明确出现或被识别的 NPC
    - 必填字段: name, gender, affiliation, position
    - 未知字段可省略，不要照抄玩家状态栏

  format: |-
    <npcdata>
    [
      {
        "name": "岚绯",
        "gender": "female",
        "affiliation": "夜莺",
        "position": "税务官",
        "location": "艾瑞拉·北门分区",
        "psionic_rank": "Lv.1",
        "perception": 14,
        "status_tags": ["目标锁定"]
      }
    ]
    </npcdata>
