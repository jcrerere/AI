<WORLD_机制_灵弦卡池等级检索_前端对齐>
机制名称: 灵弦卡池等级检索（前端对齐）
适用范围: 玩家、NPC、开局灵弦选择、运行时灵弦挂载、AI隐藏提示

核心规则: |
  - 灵弦完整卡池由前端维护，包含通用池、性别池、种族专属池、破锁路径与同名灵弦的不同等级卡。
  - 角色世界书条目不负责展开整张灵弦卡的完整效果，只负责声明该角色当前已挂载了哪条灵弦、挂在哪个灵枢部位、等级是多少，或是否为传说词条/灵核能力。
  - AI在对戏时，不得仅根据灵弦名称自由猜测能力，更不得把其他等级的能力串用到当前等级上。
  - 前端应根据“灵弦名称 + 等级 + 部位”检索到对应卡面，再把该等级的 description、effectLines、aiSummary 等摘要注入给AI。
  - 若某条灵弦存在更高等级能力，而当前等级尚未达到，则这些更高等级效果不应在当前等级摘要中泄露。

等级迷雾: |
  - 玩家只应稳定看到当前已选择等级对应的灵弦信息。
  - 更高等级可被设计为“存在但未明说”的状态，使玩家保留升级探索空间。
  - NPC对戏也应优先按其当前已挂载等级行动，而不是默认掌握该灵弦的满级表现。

角色条目写法: |
  - 推荐格式为：部位 -> 灵弦名称 -> 等级/传说/灵核。
  - 不在角色条目里展开来源、用法和完整机制说明。
  - 机制说明、等级差异、破锁路径、部位兼容性，应以前端灵弦卡池定义为准。

AI对齐要求: |
  - 若世界书条目与前端卡池同时存在，以“角色条目声明当前挂载 + 前端卡池声明当前等级效果”为准。
  - 若角色条目只给出名称但未给出等级，AI不得自行补完高阶能力。
  - 若前端未检索到对应等级卡面，AI只能按角色条目中明确写出的最少信息行事，不得擅自升级效果。
</WORLD_机制_灵弦卡池等级检索_前端对齐>
