```yaml
【目标】
统一“住所”作为可追踪状态位，避免只靠对戏漂移。

【通用规则】
1. 每个区域至少有一个基础住所（安全屋/旅店/宿舍/营地等）。
2. 角色可拥有：当前住所(player.residence.current_residence_id / current_residence_label) 与 已解锁住所(player.residence.unlocked_residence_ids)。
3. 住所可提供：休整、存放、会面、隐匿、状态恢复等基础功能。
4. 若叙事未明确更换住所，则默认沿用上一回合 current_residence_id / current_residence_label。

【回合处理】
1. 执行“回住处/过夜/休整”时，允许恢复部分资源或移除短时负面。
2. 执行“搬迁/租用/夺取据点”时，更新 player.residence.current_residence_id / current_residence_label 与 unlocked_residence_ids。
3. AI需在sum或变量中保持住所信息连续，不得无因跳变。

【区域特例接入】
1. 基础框架对所有区域生效。
2. 区域特有设施（如艾瑞拉专属场所）通过独立条目追加，不覆盖通用规则。
3. 艾瑞拉若已进入 Beta 管理链且未明确另行搬迁，可默认沿用 assigned_hx_dorm_label 作为官方登记住所。
```
