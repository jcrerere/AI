```yaml
【目标】
统一黑市服务、暗网委托、赏金、护送、走私与情报单的运转方式，让“接单”成为稳定剧情链，而不是每次临时编一个任务板。

【主要入口】
1. 诺丝区
   - 公开入口：罪吻广场、私信牵线、掮客搭话
   - 深层入口：暗网黑市服务、匿名拍卖、改写门店、黑市医生
   - 典型单型：违禁服务、情报购买、跑腿、洗钱、改写、追债

2. 交界地
   - 公开入口：狗镇、冒险者公会、荒野集市
   - 深层入口：军阀中介、黑吃黑转包、遗迹回收私单
   - 典型单型：护送、回收、狩猎、清剿、押货、悬赏

3. 汐屿区
   - 公开入口：西港一号码头、会馆关系线、港务采购口
   - 深层入口：潮镜别墅、私人转运线、贵客隐秘委托
   - 典型单型：高价接待、货物流转、贵宾保密、外海交易

4. 淬灵区
   - 公开入口：桥口结算站、工票中介、官方兑换窗口
   - 深层入口：批次调包、伪票据、走私币流、后仓偷换
   - 典型单型：跑桥、调包、压缩配额、替人背票、币流转手

【委托来源】
1. 个人委托：掮客、商人、黑市医生、私宴主人、税务躲债人
2. 机构外包：金丝、汐屿局外围、淬灵署外围、夜莺底层跑腿、真理部灰活
3. 势力任务：黑玫瑰、反抗军、军阀、教会线人、港务关系网

【常见任务结构】
1. 接单条件：熟人、押金、担保、战绩、保密协议或一次可信交付
2. 执行过程：交货 / 护送 / 取证 / 跑桥 / 接人 / 买情报 / 卖材料
3. 结算方式：灵能币、分成、债务抵扣、情报交换、路线资格、设施准入
4. 失败代价：违约金、追债、封号、拉黑、被悬赏、被机构记档、被迫补单

【悬赏规则】
1. 悬赏更适合交界地、诺丝区与暗网，不适合写成艾瑞拉官方常态任务板。
2. 悬赏对象可以是人、货、材料、情报、遗物，也可以是“查出是谁泄密”这类软目标。
3. 高额悬赏通常意味着至少一方会黑吃黑，不应写得像稳定公务外包。

【与现有系统的连接】
1. 暗网负责“接触黑市与单子”。
2. 私信负责“被谁牵线、谈条件、改时间”。
3. 钱包负责“押金、预付款、尾款、抽成、罚没”。
4. 区域法域负责“这单在当前区域是否合法、危险点在哪”。
5. 设施条目负责“具体在哪接、在哪交、在哪翻车”。

【AI执行约束】
1. 黑市委托不应无中生有地出现完整合同，先有人脉、线索或交易接口，再出现正式单子。
2. 不要把所有委托都写成战斗任务；买情报、送货、掩护、接待、陪同、伪装都可以成立。
3. 若任务涉及跨区，应明确桥口、码头、关卡、税票、邀请或人脉如何解决。
4. 若任务在艾瑞拉展开，黑市委托通常应伪装成押送、登记、替跑、调卷或样板服务，不要直接写成公开黑市。
```
