【适用范围】本条统一约束区域法域、边检、宵禁、执法强度、税务追缴与官方兑换可用性；各区域细节以对应区域条目为准。

【区域法域矩阵】
1. 艾瑞拉法域
   - 基调：首都高压监管区，秩序、审查与合法性叙事最强。
   - Beta：进入核心城市空间默认要求合法 Beta 芯片或等效许可。
   - 宵禁：男性受 HX 男奴公寓与夜间外出限制。
   - 税务：夜莺与税务官链条最稳定，抽查、月结、追缴最严格。
   - 兑换：官方兑换开放，但记录与审计最严。
   - 执法：高压，街面检查、押送、现场裁量均成立。

2. 淬灵区法域
   - 基调：工业监管区，重点不在享乐秩序，而在生产、压缩、票据与批次管理。
   - Beta：不以首都式生活管控为核心，但桥口、工区、压缩线有明确准入条件。
   - 宵禁：常规工区管理，重点是班次、工位与仓储动线。
   - 税务：票据留痕、流向登记、桥口结算比街面抽查更关键。
   - 兑换：官方兑换与跨级业务可办，但监管严格。
   - 执法：中高压，以工序违规、走私、偷换批次为主要风险。

3. 汐屿区法域
   - 基调：港口与旅游混合区，更强调边检、证件与消费秩序。
   - Beta：不做艾瑞拉式高压统治，但出入港、会馆与私人码头重视身份核验。
   - 宵禁：以港区巡查和私人安保为主，没有首都式统一夜禁。
   - 税务：消费、口岸抽查与私人贸易留痕更重要。
   - 兑换：官方兑换可用，但效率和审计强度低于艾瑞拉。
   - 执法：中等，重点是证件、走私、越区通行与高端会馆秩序。

4. 诺丝区法域
   - 基调：半自治商业灰区，规则存在，但更像利益秩序而不是国家秩序。
   - Beta：无首都式普遍管控，更多依赖势力默契、收费、买通与局部准入。
   - 宵禁：无统一硬夜禁，灰产与娱乐区长期活跃。
   - 税务：商会抽成、灰色分账、保护费高于正规税单逻辑。
   - 兑换：无官方兑换点，仅有民间低效兑换。
   - 执法：弹性，以利益为导向；得罪错人比触法更危险。

5. 圣教区法域
   - 基调：教律高压区，宗教秩序高于世俗行政。
   - Beta：不依赖首都式芯片治理，但会以教义审查与教化机制替代。
   - 宵禁：以修道院、教化所、巡礼路线和宗教巡查构成高压夜间秩序。
   - 税务：教会征收与献祭逻辑优先。
   - 兑换：无官方兑换点，不提供跨级兑换服务。
   - 执法：高压，但形式是宗教惩戒、教化、拘押与献祭秩序。

6. 交界地法域
   - 基调：法域真空地带，更多依赖势力自治与生存规则。
   - Beta：无普遍强制要求。
   - 宵禁：无统一夜禁，具体看营地、镇区与军阀地盘。
   - 税务：无统一国家税单，更多是抽成、过路费、摊位费与保护费。
   - 兑换：民间兑换、黑市兑换与以物易物并存。
   - 执法：碎片化，高度依赖当地武装、军阀、狗镇筛查与临时秩序。

【边检与跨区】
1. 进入艾瑞拉、核心桥口、特定工区、港口或会馆时，应优先判断证件、芯片、邀请、票据与携带物。
2. 努布桥、赫卡桥、叹息大桥、观海桥及其桥口设施不仅是交通点，也是税务与筛查节点。
3. “无 Beta 芯片”“无证件”“携带走私品”“跨区兑换”“押送对象”都可触发关卡叙事。

【叙事使用优先级】
1. 谈城市治理、换区、入城、过桥、出港、查验、税单、宵禁、兑换时，应优先引用本条。
2. 谈具体地点、机构或人物活动时，再叠加对应区域条目与设施条目。
3. 同一场景中，区域法域负责解释“规则”，设施条目负责解释“接口与场所”。

【AI执行约束】
1. 角色进入新区域时，应同步切换法域描述，不得继续沿用上一地区的监管规则。
2. 圣教区不得写出官方兑换点；诺丝区不得写出稳定的国家官方兑换窗口。
3. 交界地不得写成统一国家治安区；艾瑞拉不得写成无芯片、无税务、无夜间管控的自由区。
4. 如果场景同时涉及钱包、税务、月结、暗网、出行，应先判断所在区域，再决定反馈、代价与可用服务。
