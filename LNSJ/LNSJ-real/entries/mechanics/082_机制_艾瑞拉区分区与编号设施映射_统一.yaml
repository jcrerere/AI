```yaml
【目标】
统一艾瑞拉区的分区、税务、住册、押送与编号设施命名，避免把 X号性控所 / HX男奴公寓误写成单点地点。

【当前官方分区锚点】
1. 北门分区
   - 法域角色：入城口与筛查前沿，关卡、桥检、税务抽查密度高。
   - 对应税务：艾瑞拉区·北门分区税务局
   - 默认编号设施：X1性控所 / H10男奴公寓
2. 中环分区
   - 法域角色：首都中心秩序带，官方服务、抽样、宣传与样板管理最稳定。
   - 对应税务：艾瑞拉区·中环税务局
   - 默认编号设施：X2性控所 / H18男奴公寓
3. 南港分区
   - 法域角色：港务、物流、外来人口和夜间管理接口，押送与住册交叉最频繁。
   - 对应税务：艾瑞拉区·南港税务局
   - 默认编号设施：X4性控所 / H27男奴公寓

【保留编号】
1. X3 / X5 仍属于艾瑞拉区官方性控所体系，但默认不作为玩家的常驻绑定点。
2. 可在旧港审查带、特案改造流程、高戒收容等剧情中使用 X3 / X5。
3. H系允许继续扩楼，但未明确前不要一次性生成大量 H 楼栋。

【命名协议】
1. 完整地址优先写：艾瑞拉区·{分区}·Xn性控所 / 艾瑞拉区·{分区}·Hnn男奴公寓。
2. 民间称呼可以更口语，但税务、住册、押送、点名、审查、系统记录必须回落到官方编号。
3. 若正文只写“H10”“X2”，sum 或变量最好补全成完整标签。

【变量映射】
1. world.current_district 维护当前官方分区。
2. world.current_site_type 使用 x_station / hx_dorm / tax_office 这类枚举。
3. world.current_site_id 使用 X1 / H10 / north_gate_tax 这类可识别标识。
4. world.current_site_label 使用完整官方标签。
5. player.chip.assigned_district / assigned_x_station_* / assigned_hx_dorm_* 表示 Beta 管理链下的登记绑定。
6. player.residence.current_residence_* 表示当前实际住处；若未明确搬迁，可沿用 assigned_hx_dorm_label。

【执行约束】
1. 当前前端与酒馆变量的稳定映射只绑定 北门 / 中环 / 南港 三个官方分区，先保证运行一致性。
2. 若剧情引用 X3 / X5 或新增 H系楼栋，必须在正文中交代其分区与用途，不要凭空飘出编号。
3. 不要把“艾瑞拉区的官方分区”写成模糊片区名；官方系统优先认分区 + 编号，而不是诗性别称。
```
