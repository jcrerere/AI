```yaml
【目标】
为艾瑞拉区、诺丝区、圣教区提供稳定可复用的事件骨架，让 AI 在这些区域推进剧情时更像沿着本地制度和设施自然生长，而不是每次临时拼装。

【艾瑞拉区事件模板】
1. 税务 / 执法线
   - 入口：夜莺抽查、税务催缴、桥检、住册核验
   - 升级：补税、押送、分区调卷、审讯、送规训学院
   - 常见设施：夜莺总部、审判庭、HX男奴公寓、分区税务局
   - 代价：罚没、信誉下跌、强制登记、住处受限

2. 宣传 / 样板线
   - 入口：真理部调卷、规训学院点名、官方样板招募
   - 升级：被塑造成样板、负面教材、公开演示对象
   - 常见设施：真理部大楼、规训学院园区、审判庭、女皇弧光剧院、绯序穹廊
   - 代价：档案留痕、后续机构联动、失去自主口径

3. 医疗 / 管控线
   - 入口：官方体检、芯片异常、毒素反应、义体损坏
   - 升级：被转入鸢翎总部、调取芯片记录、与夜莺并案
   - 常见设施：鸢翎总部、夜莺总部、X号性控所
   - 代价：治疗费、住院管制、更多记录沉淀

【诺丝区事件模板】
1. 黑市 / 生意线
   - 入口：罪吻广场、掮客私信、黑市医生、人情引荐
   - 升级：改写、追债、抽成、假货、翻单
   - 常见设施：罪吻广场、金丝总部、星轨总部、灵械斗技穹笼、绮债包厢环、瘾巷
   - 代价：债务、封号、被拉黑、被盯上

2. 数据 / 灵网线
   - 入口：热榜、付费订阅、数据泄露、账号异常
   - 升级：被卖数据、被流量操盘、被技术勒索、卷入平台控制权
   - 常见设施：星轨总部、浮霓会展塔、灵械斗技穹笼、剥光秀台、诺丝大学、匿名机房
   - 代价：隐私失守、舆论反噬、账号价值被榨干

3. 商业 / 注册线
   - 入口：开店、挂靠、融资、保险金、商业纠纷
   - 升级：被要求注册、被踢出保护网、被竞争对手做局
   - 常见设施：金丝总部、白湾会馆、狗镇
   - 代价：保证金、抽成、人情债、供应链被卡

【圣教区事件模板】
1. 入教 / 试探线
   - 入口：布道、告解、巡礼邀请、修女接触
   - 升级：被要求洗礼、背诵教义、参与小型仪式
   - 常见设施：教化所、修道院、圣痕浴场、大圣堂
   - 代价：精神压迫、被记名、被持续盯上

2. 献祭 / 审誓线
   - 入口：异端嫌疑、失礼、拒绝入教、携带违禁物
   - 升级：押送、审誓、苦修、公开献祭准备
   - 常见设施：教化所、圣殿骑士团驻地、风誓原场、大圣堂
   - 代价：自由受限、身体折磨、被视作供品

3. 资源 / 政治线
   - 入口：粮食、电力、边贸、教会代理人谈判
   - 升级：供给卡口、谈判破裂、借祭仪施压
   - 常见设施：大圣堂、修道院、风电与粮区外围接口
   - 代价：补给断档、政治表态、被迫站队

【执行约束】
1. 进入区域后，优先从该区域的事件模板里挑一个推进，不要把三种区域气质写成同一种任务板。
2. 设施条目负责“场面和接口”，本条负责“事件骨架和升级路径”。
3. 艾瑞拉区更像制度追压，诺丝区更像利益试探，圣教区更像信仰与献祭拉扯。
4. 若事件跨区，先明确是哪一区域发单、哪一区域执行、哪一区域结算。
```
