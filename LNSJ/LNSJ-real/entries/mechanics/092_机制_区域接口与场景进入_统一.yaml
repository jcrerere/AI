```yaml
【目标】
统一“玩家接下来去哪里、从哪里进入场景”的叙事接口，避免一换区就直接跳进最深层设施，也避免每个区域都靠新增散点地点硬撑。

【区域接口优先表】
1. 艾瑞拉区
   - 外层入口：桥检、城门、分区税务局、夜莺抽查点
   - 中层接口：HX男奴公寓、官方住册、税务官办公室、鸢翎总部接诊区、女皇弧光剧院
   - 深层设施：真理部大楼、规训学院园区、审判庭、夜莺总部、绯序穹廊、X号性控所
   - 叙事节奏：先过制度接口，再进入高压核心设施

2. 诺丝区
   - 外层入口：商业街、公开娱乐场、灵网联系人、掮客私信
   - 中层接口：罪吻广场、灰产中介、黑市医生、改写门店、金丝注册窗口、裂帛赛道、绮债包厢环
   - 深层设施：星轨总部、金丝总部、浮霓会展塔、灵械斗技穹笼、瘾巷、剥光秀台、地下会所、深层拍卖间、匿名交易室
   - 叙事节奏：先见人脉和买路钱，再下潜到真正黑网层

3. 汐屿区
   - 外层入口：西港一号码头、旅客登记、港务放行口
   - 中层接口：白湾会馆、港区采购线、汐屿局登记关系
   - 深层设施：潮镜别墅、封闭私宴、私人转运线、海景谈判场
   - 叙事节奏：先过证件和接待层，再进入贵宾私密空间

4. 淬灵区
   - 外层入口：桥口结算站、货税窗口、工票核验
   - 中层接口：压缩线、回收厂、炼线试验塔、官方兑换窗口
   - 深层设施：批次调包点、工艺禁区、配额黑洞、币流后仓
   - 叙事节奏：先过票据和工序接口，再接触真正的黑工艺

5. 圣教区
   - 外层入口：巡礼路线、布道点、告解入口、教化所接待区
   - 中层接口：修道院、教化所、圣痕浴场、审誓厅、骑士驻点、献祭登记处
   - 深层设施：大圣堂、风誓原场、异端审判场、密仪场、修女封闭区
   - 叙事节奏：先被教义筛过，再进入高压宗教核心

6. 交界地
   - 外层入口：狗镇路口、荒野集市、军阀岗哨、补给摊
   - 中层接口：冒险者公会、赏金板、护送点、拾荒中介
   - 深层设施：南荒路线、遗迹入口、军阀仓、秘密营地
   - 叙事节奏：先定活路和雇主，再进入高风险地带

【场景选择规则】
1. 当用户说“去哪”“下一步做什么”“找个地方”“先落脚/先赚钱/先治伤/先躲风头”时，优先从当前区域给出 2~3 个接口地点，而不是直接给 5~8 个远端地名。
2. 当用户明确点名某设施时，可直接进入该设施，同时补上所属区域法域与上一层入口逻辑。
3. 当用户只是提地区，不应自动展开所有地点细节；只保留区域基调和 1~2 个最相关接口。

【目标导向映射】
1. 找钱：诺丝区黑市接单 / 交界地公会委托 / 淬灵区跑桥与配额活
2. 治伤：诺丝区黑市医生 / 汐屿高价接待医疗 / 艾瑞拉区官方登记医疗
3. 躲风头：汐屿会馆与别墅线 / 交界地临时营地 / 诺丝区匿名窝点
4. 过夜：当前住所优先；无住所时先找本区中层接口，而不是直接随机生成豪华据点
5. 查人或查档：艾瑞拉区走税务/真理部/审判链，诺丝区走灵网/掮客/暗网链，交界地走悬赏/公会/中介链

【AI执行约束】
1. 区域接口负责“怎么进去”，设施条目负责“进去之后是什么”；两者不要混写。
2. 除非用户明确要求或剧情已铺垫，否则不要从街头一步跳到最深层设施。
3. 若场景切换涉及跨区，先过桥口、码头、关卡、票据、邀请或人脉解释，再进入下一区域内部地点。
4. 同一回复里不要堆太多地点名，优先给当前最可执行的入口。
```
