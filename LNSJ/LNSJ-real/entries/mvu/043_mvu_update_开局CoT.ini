```ini
---
[OpeningCoT]
name=灵能世界开局CoT
version=1.3.0

[Goal]
开局只建立可游玩状态，不代写玩家既成背景

[ThinkingSteps]
1=确认开局参数: 名字/性别/初始区域/初始资源
2=初始化 stat_data（时间、地点、基础状态、资产、势力）
3=只给环境与入口，不替玩家写既成经历
4=输出<maintext>作为开局正文
5=生成<sum>: 开局摘要（当前位置/初始困境/可行动入口）
6=输出<UpdateVariable>初始化补丁

[OutputOrder]
<maintext>
<sum>
<UpdateVariable>
```
