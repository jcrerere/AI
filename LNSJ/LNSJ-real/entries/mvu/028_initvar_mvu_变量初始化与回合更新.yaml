[回合更新约束]
1) 时间推进：每回合默认推进5~30分钟；必须同步更新 current_time 与 current_period。
2) 地点阵营：位移必须更新 world.current_location 与 player.region；势力变化同步 world.current_faction 与 player.faction。
3) 状态资源：受伤/治疗改 hp；灵能消耗/恢复改 mp 与 psionic.energy_value.current；精神冲击改 sanity；所有 current 必须在 [0,max]。
4) 兑换规则：同级理论1:1；实际受 conversion_rate 与 region_modifier 影响；跨级固定损耗 cross_level_loss_rate；圣教区禁止兑换。
5) 艾瑞拉区编号设施：若进入 X/H 编号设施，应同步 world.current_district / current_site_type / current_site_id / current_site_label。
6) Beta税务官：beta_equipped=true 且 tax_officer_id 为空时，必须触发分配事件并写入 assigned_district / assigned_x_station_* / assigned_hx_dorm_* / tax_officer_* / tax_rate。
7) 开局主导：flags.opening_locked=true 时，AI只给环境与入口，不得替玩家预写既成开局。
