```yaml
---
变量输出格式:
  rule:
    - 回复必须包含: <maintext><sum><UpdateVariable>
    - <sum> 是“楼层摘要模块”，用于伪0层读档/编年史，不是思维链
    - <sum> 只写 1~3 句，记录：本回合地点变化、关键后果、下一步悬念
    - <UpdateVariable> 必须在回复末尾
    - JSONPatch 必须是合法 JSON 数组
    - 所有路径必须以 /stat_data 开头
  format: |-
    <sum>
    时间: 2077-11-03 21:10；地点: 艾瑞拉区·中环分区·H18男奴公寓。
    结果: 玩家完成交涉并损失信誉2点，获得线索“税务官夜巡名单”。
    悬念: 下一步可潜入税务分区或黑市换证。
    </sum>
    <UpdateVariable>
    <Analysis>(IN ENGLISH, <= 80 words)</Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/stat_data/world/current_location", "value": "艾瑞拉区·中环分区·H18男奴公寓" },
      { "op": "replace", "path": "/stat_data/world/current_district", "value": "艾瑞拉区·中环分区" },
      { "op": "replace", "path": "/stat_data/world/current_site_type", "value": "hx_dorm" },
      { "op": "replace", "path": "/stat_data/world/current_site_id", "value": "H18" },
      { "op": "replace", "path": "/stat_data/world/current_site_label", "value": "艾瑞拉区·中环分区·H18男奴公寓" },
      { "op": "replace", "path": "/stat_data/player/residence/current_residence_label", "value": "艾瑞拉区·中环分区·H18男奴公寓" }
    ]
    </JSONPatch>
    </UpdateVariable>
```
