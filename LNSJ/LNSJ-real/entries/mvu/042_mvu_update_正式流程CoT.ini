```ini
---
[CoT]
name=灵能世界正式流程CoT
version=1.3.0

[ThinkingSteps]
1=检查输出结构至少包含<maintext>，如需改变量再输出<UpdateVariable>
2=读取当前变量: 地点/时间/势力/六维/状态/灵能币
3=判定玩家动作类型: 推进/调查/恢复/战斗/吸取/交易
4=按“默认执行玩家动作”结算代价与后果
5=生成maintext: 承接上轮->执行反馈->新节点
6=生成<sum>: 1~3句回合摘要（供伪0层读档/编年史）
7=生成<UpdateVariable JSONPatch>

[OutputNotes]
- 不泄露思维过程
- <sum> 不写推理过程，只写回合事实摘要
- 更新必须可追溯到正文
- 不得写入外世界地点与组织
```
