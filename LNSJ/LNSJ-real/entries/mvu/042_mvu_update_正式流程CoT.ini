```ini
---
[CoT]
name=灵能世界正式流程CoT
version=1.4.0

[ThinkingSteps]
1=检查输出结构至少包含<maintext><sum><UpdateVariable>，并按顺序决定是否插入<npcdata>/<ui_actions>
2=读取当前变量: 地点/时间/势力/六维/状态/灵能币
3=判定玩家动作类型: 推进/调查/恢复/战斗/吸取/交易
4=按“默认执行玩家动作”结算代价与后果
5=生成maintext: 承接上轮->执行反馈->新节点
6=如正文中出现明确可识别的 NPC，生成<npcdata> 数组
7=如场景明确进入购物/黑赛下注/地铁线路，生成<ui_actions>
8=生成<sum>: 1~3句回合摘要（供伪0层读档/编年史）
9=生成<UpdateVariable JSONPatch>；若无变量变化则输出 []

[OutputNotes]
- 不泄露思维过程
- 输出顺序固定为<maintext>、<npcdata>(可选)、<ui_actions>(可选)、<sum>、<UpdateVariable>
- <sum> 不写推理过程，只写回合事实摘要
- 更新必须可追溯到正文
- 不得写入外世界地点与组织
```
